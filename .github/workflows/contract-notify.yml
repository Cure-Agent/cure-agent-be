name: Contract Notify

# openapi/ 계약이 main에 반영되면 FE 레포에 동기화를 즉시 트리거한다 (architecture.md §1).
# CONTRACT_SYNC_TOKEN(fine-grained PAT, cure-agent-fe Contents R/W)이 없거나 만료되면
# 이 job은 실패한다 — 동기화 누락은 조용히 지나가지 않는다 (폴백 없음).

on:
  push:
    branches: [main]
    paths: ['openapi/**']
  workflow_dispatch: # 재시도·검증용 수동 트리거

jobs:
  notify-fe:
    runs-on: ubuntu-latest
    steps:
      - name: FE 레포에 contract-updated dispatch
        env:
          SYNC_TOKEN: ${{ secrets.CONTRACT_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::CONTRACT_SYNC_TOKEN이 설정되지 않았습니다 — FE 동기화가 트리거되지 않습니다"
            exit 1
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $SYNC_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Cure-Agent/cure-agent-fe/dispatches \
            -d "{\"event_type\":\"contract-updated\",\"client_payload\":{\"sha\":\"$GITHUB_SHA\"}}"
          echo "FE contract-sync 트리거 완료"
